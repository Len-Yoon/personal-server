name: Deploy N100

permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64]
    concurrency:
      group: deploy-n100-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Verify N100 deployment directory
        shell: cmd
        run: |
          @echo off
          set "PROJECT_ROOT=C:\personal-server"
          whoami
          if not exist "%PROJECT_ROOT%\.git" exit /b 1
          if not exist "%PROJECT_ROOT%\.env" exit /b 1
          if not exist "%PROJECT_ROOT%\data" exit /b 1
          if not exist "%PROJECT_ROOT%\docker-compose.yml" exit /b 1
          if not exist "%PROJECT_ROOT%\docker-compose.n100.yml" exit /b 1

      - name: Run deployment script
        shell: cmd
        run: |
          @echo off
          if not exist "%SystemRoot%\System32\wsl.exe" exit /b 1
          wsl.exe -d Ubuntu-24.04 -- bash -lc "cd /mnt/c/personal-server && bash ./scripts/deploy-n100.sh"
          if errorlevel 1 exit /b 1
