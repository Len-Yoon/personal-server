name: Deploy N100

permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64]
    concurrency:
      group: deploy-n100-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Verify N100 deployment directory
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $projectRoot = 'C:\personal-server'
          $requiredPaths = @(
            "$projectRoot\.git",
            "$projectRoot\.env",
            "$projectRoot\data",
            "$projectRoot\docker-compose.yml",
            "$projectRoot\docker-compose.n100.yml"
          )
          foreach ($path in $requiredPaths) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Required N100 deployment path is missing: $path"
            }
          }

      - name: Run deployment script
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bash = 'C:\Program Files\Git\bin\bash.exe'
          if (-not (Test-Path -LiteralPath $bash)) {
            throw "Git Bash was not found: $bash"
          }
          & $bash -lc 'cd /c/personal-server && bash ./scripts/deploy-n100.sh'
          if ($LASTEXITCODE -ne 0) {
            throw "N100 deployment script failed with exit code $LASTEXITCODE"
          }
