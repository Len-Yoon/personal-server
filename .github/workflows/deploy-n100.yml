name: Deploy N100

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.N100_SSH_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.N100_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Run deployment script
        env:
          N100_SSH_HOST: ${{ secrets.N100_SSH_HOST }}
          N100_SSH_PORT: ${{ secrets.N100_SSH_PORT }}
          N100_SSH_USER: ${{ secrets.N100_SSH_USER }}
          N100_APP_DIR: ${{ secrets.N100_APP_DIR }}
        run: |
          ssh -p "${N100_SSH_PORT:-22}" "${N100_SSH_USER}@${N100_SSH_HOST}" \
            "cd '${N100_APP_DIR}' && bash scripts/deploy-n100.sh"
