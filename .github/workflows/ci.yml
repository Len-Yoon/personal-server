name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: portal
            requirements: portal-web/requirements.txt
            pythonpath: portal-web
            test_command: python3 -m unittest tests.test_portal_dashboard tests.test_portal_security
          - name: system-agent
            requirements: system-agent/requirements.txt
            pythonpath: system-agent
            test_command: python3 -m unittest tests.system_agent.test_metrics
          - name: crawler-worker
            requirements: crawler-worker/requirements.txt
            pythonpath: crawler-worker
            test_command: python3 -m unittest tests.crawler_worker.test_datetime_format tests.crawler_worker.test_investing_news_rss tests.crawler_worker.test_news_service tests.crawler_worker.test_rss_news
          - name: youtube-memo
            requirements: youtube-memo/requirements.txt
            pythonpath: youtube-memo
            test_command: python3 -m unittest tests.youtube_memo.test_video_titles
          - name: book-memo
            requirements: book-memo/requirements.txt
            pythonpath: book-memo
            test_command: python3 -m unittest tests.book_memo.test_book_service
          - name: investing-crawler
            requirements: investing_crawler/requirements.txt
            pythonpath: .
            test_command: python3 -m unittest tests.test_investing_crawler_config tests.investing_crawler.test_main tests.investing_crawler.test_news_parser tests.investing_crawler.test_obsidian_writer tests.investing_crawler.test_rss_collector
          - name: maintenance
            requirements: ""
            pythonpath: .
            test_command: python3 -m unittest tests.test_compose_config tests.test_maintenance tests.test_windows_bootstrap

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: matrix.requirements != ''
        run: python3 -m pip install -r ${{ matrix.requirements }}

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ matrix.pythonpath }}
        run: ${{ matrix.test_command }}
