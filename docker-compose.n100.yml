# N100 override: binds app ports to localhost and adds Caddy for public HTTPS.
services:
  portal-web:
    ports: !override
      - "127.0.0.1:8000:8000"
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "1"
      - --no-access-log
    environment:
      - FILE_STORAGE_PATH=/data/files
      - PYTHONDONTWRITEBYTECODE=1
    cpus: "0.25"
    mem_limit: 160m
    pids_limit: 128
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=32m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  system-agent:
    ports: !override
      - "127.0.0.1:18010:8010"
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8010"
      - --workers
      - "1"
      - --no-access-log
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    cpus: "0.15"
    mem_limit: 96m
    pids_limit: 96
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  crawler-worker:
    ports: !override
      - "127.0.0.1:8001:8001"
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --workers
      - "1"
      - --no-access-log
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    cpus: "0.50"
    mem_limit: 320m
    pids_limit: 160
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=32m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  investing-crawler:
    cpus: "0.50"
    mem_limit: 128m
    pids_limit: 96
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256m,mode=1777

  youtube-memo:
    ports: !override
      - "127.0.0.1:8002:8002"
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8002"
      - --workers
      - "1"
      - --no-access-log
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    cpus: "0.25"
    mem_limit: 160m
    pids_limit: 128
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=32m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  book-memo:
    ports: !override
      - "127.0.0.1:8003:8003"
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8003"
      - --workers
      - "1"
      - --no-access-log
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    cpus: "0.35"
    mem_limit: 192m
    pids_limit: 128
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=32m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  caddy:
    build:
      context: ./caddy
    restart: unless-stopped
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
    depends_on:
      portal-web:
        condition: service_healthy
      crawler-worker:
        condition: service_healthy
      youtube-memo:
        condition: service_healthy
      book-memo:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
