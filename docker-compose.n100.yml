      - "1"
      - --no-access-log
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    cpus: "0.50"
    mem_limit: 320m
    pids_limit: 160
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=32m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  youtube-memo:
