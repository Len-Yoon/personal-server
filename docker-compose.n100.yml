      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8002"
      - --workers
      - "1"
      - --no-access-log
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    cpus: "0.25"
    mem_limit: 160m
    pids_limit: 128
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=32m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "5m"
