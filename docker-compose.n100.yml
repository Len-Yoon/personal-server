services:
  nginx-proxy-manager:
    profiles:
      - edge
    cpus: "0.50"
    mem_limit: 384m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  portal-web:
    ports: !reset []
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "1"
      - --no-access-log
    environment:
      - FILE_STORAGE_PATH=/data/files
      - PYTHONDONTWRITEBYTECODE=1
    cpus: "0.25"
    mem_limit: 160m
    pids_limit: 128
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=32m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  system-agent:
    ports: !reset []
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8010"
      - --workers
      - "1"
      - --no-access-log
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    cpus: "0.15"
    mem_limit: 96m
    pids_limit: 96
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  crawler-worker:
