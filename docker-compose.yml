# 기본 Compose는 개발용이며, 운영은 docker-compose.n100.yml override로 덮어씀
services:
  portal-web:
    build: ./portal-web
    container_name: portal-web
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FILE_STORAGE_PATH=/data/files
      - SYSTEM_AGENT_URL=http://system-agent:8010
    volumes:
      - ./portal-web:/app
      - ./data/files:/data/files
      - ./data/logs:/app/data/logs

  system-agent:
    build: ./system-agent
    container_name: system-agent
    restart: unless-stopped
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      - DATA_ROOT=/data
      - HOST_METRICS_PATH=/data/system/host-metrics.json
    volumes:
      - ./data:/data:ro

  crawler-worker:
    build: ./crawler-worker
    container_name: crawler-worker
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --reload
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - NEWS_DB_PATH=/data/crawler-worker/news_summaries.sqlite3
    volumes:
      - ./crawler-worker:/app
      - ./data/crawler-worker:/data/crawler-worker
      - ./data/logs:/app/data/logs

  investing-crawler:
    build:
      context: .
      dockerfile: investing_crawler/Dockerfile
    command: python -m app.main
    env_file:
      - .env
    environment:
      - OBSIDIAN_VAULT_PATH=/vault
    volumes:
      - ${OBSIDIAN_VAULT_PATH}:/vault

  youtube-memo:
    build: ./youtube-memo
    container_name: youtube-memo
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8002"
      - --reload
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - YOUTUBE_MEMO_DB_PATH=/data/youtube-memo/youtube_memo.sqlite3
    volumes:
      - ./youtube-memo:/app
      - ./data/youtube-memo:/data/youtube-memo
      - ./data/logs:/app/data/logs

  book-memo:
    build: ./book-memo
    container_name: book-memo
    restart: unless-stopped
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8003"
      - --reload
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - BOOK_MEMO_DB_PATH=/data/book-memo/book_memo.sqlite3
    volumes:
      - ./book-memo:/app
      - ./data/book-memo:/data/book-memo
      - ./data/logs:/app/data/logs
