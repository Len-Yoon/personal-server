services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./data/npm/data:/data
      - ./data/npm/letsencrypt:/etc/letsencrypt

  portal-web:
    build: ./portal-web
    container_name: portal-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FILE_STORAGE_PATH=/data/files
    volumes:
      - ./portal-web:/app
      - ./data/files:/data/files

  crawler-worker:
    build: ./crawler-worker
    container_name: crawler-worker
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - NEWS_DB_PATH=/data/crawler-worker/news_summaries.sqlite3
    volumes:
      - ./crawler-worker:/app
      - ./data/crawler-worker:/data/crawler-worker
      - ./data/logs:/app/data/logs

  youtube-memo:
    build: ./youtube-memo
    container_name: youtube-memo
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - YOUTUBE_MEMO_DB_PATH=/data/youtube-memo/youtube_memo.sqlite3
    volumes:
      - ./youtube-memo:/app
      - ./data/youtube-memo:/data/youtube-memo
      - ./data/logs:/app/data/logs

  book-memo:
    build: ./book-memo
    container_name: book-memo
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - BOOK_MEMO_DB_PATH=/data/book-memo/book_memo.sqlite3
    volumes:
      - ./book-memo:/app
      - ./data/book-memo:/data/book-memo
      - ./data/logs:/app/data/logs
